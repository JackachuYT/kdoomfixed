name: Build KDoom for Kindle PW2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi make
          for tool in $(ls /usr/bin/arm-linux-gnueabi-*); do
            newname=$(basename $tool | sed 's/arm-linux-gnueabi/arm-kindlepw2-linux-gnueabi/')
            sudo ln -sf $tool /usr/local/bin/$newname
          done
          sudo ln -sf /usr/bin/arm-linux-gnueabi-gcc /usr/local/bin/arm-kindlepw2-linux-gnueabi-cc
          sudo ln -sf /usr/bin/arm-linux-gnueabi-gcc /usr/local/bin/arm-kindlepw2-linux-gnueabi-gcc-ar

      - name: Build
        run: make package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kdoom-kindlepw2-fixed
          path: extensions/
          if-no-files-found: warn
