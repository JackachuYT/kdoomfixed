name: Build KDoom for Kindle PW2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi make
          sudo ln -s /usr/bin/arm-linux-gnueabi-gcc    /usr/local/bin/arm-kindlepw2-linux-gnueabi-gcc
          sudo ln -s /usr/bin/arm-linux-gnueabi-g++    /usr/local/bin/arm-kindlepw2-linux-gnueabi-g++
          sudo ln -s /usr/bin/arm-linux-gnueabi-ar     /usr/local/bin/arm-kindlepw2-linux-gnueabi-ar
          sudo ln -s /usr/bin/arm-linux-gnueabi-ld     /usr/local/bin/arm-kindlepw2-linux-gnueabi-ld
          sudo ln -s /usr/bin/arm-linux-gnueabi-strip  /usr/local/bin/arm-kindlepw2-linux-gnueabi-strip
          sudo ln -s /usr/bin/arm-linux-gnueabi-ranlib /usr/local/bin/arm-kindlepw2-linux-gnueabi-ranlib
          sudo ln -s /usr/bin/arm-linux-gnueabi-objcopy /usr/local/bin/arm-kindlepw2-linux-gnueabi-objcopy

      - name: Build
        run: make package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kdoom-kindlepw2-fixed
          path: extensions/
          if-no-files-found: warn
